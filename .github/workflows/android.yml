name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    # إعداد الجافا (إصدار مستقر v3)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    # إعداد النود (إصدار مستقر v3)
    - name: Set up NodeJS
      uses: actions/setup-node@v3
      with:
        node-version: 16

    # الموافقة على تراخيص أندرويد تلقائياً لمنع توقف البناء
    - name: Accept Android Licenses
      run: |
        yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Install Cordova
      run: npm install -g cordova

    # إنشاء المشروع ونقل الملفات بالترتيب الصحيح برمجياً
    - name: Create Cordova Project & Copy Files
      run: |
        # 1. إنشاء المجلد الرئيسي
        cordova create build_dir com.bydallah6.myapp "App"
        
        # 2. نسخ ملف الإعدادات config.xml وملفات الويب أولاً قبل تهيئة المنصة
        cp config.xml build_dir/
        cp index.html build_dir/www/
        cp style.css build_dir/www/
        cp script.js build_dir/www/ || true
        cp icon.png build_dir/ || true
        cp splash.png build_dir/ || true
        
        # 3. الدخول للمجلد وتثبيت المنصة والإضافات بناءً على الإعدادات المنقولة
        cd build_dir
        cordova platform add android
        cordova plugin add cordova-plugin-camera --save

    - name: Build APK
      run: |
        cd build_dir
        cordova build android --debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: my-app-apk
        path: build_dir/platforms/android/app/build/outputs/apk/debug/app-debug.apk

    - name: Generate Build Report
      if: always()
      run: |
        echo "## 📊 تقرير بناء تطبيق الأندرويد" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ job.status }}" = "success" ]; then
          echo "### ✅ الحالة: تم البناء بنجاح والتطبيق جاهز للتحميل!" >> $GITHUB_STEP_SUMMARY
        else
          echo "### ❌ الحالة: فشلت عملية البناء، يرجى مراجعة سجل الأخطاء." >> $GITHUB_STEP_SUMMARY
        fi
