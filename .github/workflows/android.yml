name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    # إعداد الجافا (خطوة إلزامية عشان الكوردوفا يبني بدون أخطاء)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up NodeJS
      uses: actions/setup-node@v3
      with:
        node-version: 16

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create build_dir com.bydallah6.myapp "App"
        cd build_dir
        cordova platform add android
        cordova plugin add cordova-plugin-camera --save
        rm -rf www/*

    - name: Copy Files to Cordova
      run: |
        cp index.html build_dir/www/
        cp style.css build_dir/www/
        cp icon.png build_dir/ || true
        cp splash.png build_dir/ || true
        cp config.xml build_dir/ || true

    - name: Build APK
      run: |
        cd build_dir
        cordova build android --debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: my-app-apk
        path: build_dir/platforms/android/app/build/outputs/apk/debug/app-debug.apk

    - name: Generate Build Report
      if: always()
      run: |
        echo "## 📊 تقرير بناء تطبيق الأندرويد" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "${{ job.status }}" = "success" ]; then
          echo "### ✅ الحالة: تم البناء بنجاح والتطبيق جاهز للتحميل!" >> $GITHUB_STEP_SUMMARY
        else
          echo "### ❌ الحالة: فشلت عملية البناء، يرجى مراجعة سجل الأخطاء." >> $GITHUB_STEP_SUMMARY
        fi
